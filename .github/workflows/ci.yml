name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 22.22.0
          - os: macos-latest
            node: 22.22.0
          - os: windows-latest
            node: 22.22.0
          - os: ubuntu-latest
            node: 24
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run artifacts:check
      - run: npm run docs:check
      - run: npm run smoke
      - run: npm audit --audit-level=critical
