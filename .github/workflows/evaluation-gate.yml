name: Evaluation gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deterministic-evaluation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SKILLOPS_DATA_DIR: ${{ github.workspace }}/.skillops-ci-data
      SKILLOPS_EVAL_API_KEY: ${{ secrets.SKILLOPS_EVAL_API_KEY }}
      PROMPTFOO_DISABLE_TELEMETRY: "1"
      PROMPTFOO_DISABLE_UPDATE: "1"
      PROMPTFOO_DISABLE_SHARING: "1"
      PROMPTFOO_DISABLE_REMOTE_GENERATION: "true"
      PROMPTFOO_DISABLE_REDTEAM_REMOTE_GENERATION: "true"
      PROMPTFOO_CACHE_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Run deterministic managed suite
        id: evaluation
        shell: bash
        run: |
          mkdir -p artifacts
          npm run eval:run -- --suite deterministic-smoke --baseline baseline-fixture --candidate candidate-fixture --deterministic --summary artifacts/evaluation-summary.json --junit artifacts/evaluation-junit.xml | tee artifacts/evaluation-command.json
          RUN_ID=$(node -e "const fs=require('fs');const lines=fs.readFileSync(process.env.SKILLOPS_DATA_DIR+'/evaluations.jsonl','utf8').trim().split(/\n/).map(JSON.parse).filter(x=>x.type==='run'&&x.summary.status==='completed');process.stdout.write(lines.at(-1).summary.id)")
          npm run eval:verify -- --run "$RUN_ID"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sanitized-evaluation-evidence
          path: |
            artifacts/evaluation-summary.json
            artifacts/evaluation-junit.xml
