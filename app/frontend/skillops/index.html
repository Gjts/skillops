<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070b0e" />
    <meta name="description" content="Local-first Skill and Agent observability for AI-native teams." />
    <script>
      (() => {
        const config = __SKILLOPS_THEME_BOOTSTRAP__
        const themeIds = config.themes.map(({ id }) => id)
        let theme = null
        try {
          theme = window.localStorage.getItem(config.storageKey)
          if (!themeIds.includes(theme)) {
            const legacy = window.localStorage.getItem(config.legacyStorageKey)
            const migrated = config.legacyThemeMap[legacy]
            if (migrated) {
              theme = migrated
              window.localStorage.setItem(config.storageKey, theme)
              window.localStorage.removeItem(config.legacyStorageKey)
            }
          }
        } catch {}
        if (!themeIds.includes(theme)) {
          theme = window.matchMedia?.('(prefers-color-scheme: dark)').matches
            ? config.systemThemes.dark
            : config.systemThemes.light
        }
        const selected = config.themes.find(({ id }) => id === theme)
        document.documentElement.dataset.theme = theme
        document.documentElement.style.colorScheme = selected.scheme
        document.querySelector('meta[name="theme-color"]')?.setAttribute('content', selected.metaColor)
      })()
    </script>
    <title>SkillOps</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
