<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070b0e" />
    <meta name="description" content="Local-first Skill and Agent observability for AI-native teams." />
    <script>
      (() => {
        let theme = null
        try { theme = window.localStorage.getItem('skillops.theme.v1') } catch {}
        if (theme !== 'light' && theme !== 'dark') {
          theme = window.matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }
        document.documentElement.dataset.theme = theme
        document.documentElement.style.colorScheme = theme
        document.querySelector('meta[name="theme-color"]')?.setAttribute('content', theme === 'dark' ? '#070b0e' : '#f3f6f7')
      })()
    </script>
    <title>SkillOps</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
